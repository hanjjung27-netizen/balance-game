<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>밸런스 게임 참여</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --A: #e74c3c;
    --B: #3498db;
    --accent: #1abc9c;
    --accent-dark: #16a085;
    --text: #2c3e50;
    --muted: #7f8c8d;
    --radius: 18px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    user-select: none;
  }

  /* ── 대기 ── */
  #screen-waiting { text-align: center; }
  .wait-icon {
    width: 72px; height: 72px;
    background: var(--accent);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    margin: 0 auto 18px;
  }
  .wait-title { font-size: 1.5rem; font-weight: 900; color: var(--accent-dark); margin-bottom: 6px; }
  .wait-sub   { font-size: 0.9rem; color: var(--muted); }
  .pulse-dot  {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    margin: 20px auto 0;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.4} }

  /* ── 문제 표시 ── */
  #screen-showing { text-align: center; width: 100%; max-width: 380px; }
  .q-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border-radius: 999px;
    padding: 5px 16px;
    font-size: 0.78rem;
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: 0.05em;
  }
  .showing-vs {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 14px;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.7;
  }
  .showing-hint { font-size: 0.85rem; color: var(--muted); animation: blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── 투표 ── */
  #screen-voting { width: 100%; max-width: 380px; }

  .timer-bar-wrap { height: 6px; background: #dde3ea; border-radius: 3px; overflow: hidden; margin-bottom: 18px; }
  .timer-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); border-radius: 3px; transition: width 0.9s linear; }

  .vote-question { text-align: center; font-size: 1rem; font-weight: 700; margin-bottom: 20px; color: var(--text); line-height: 1.5; }

  .vote-buttons { display: grid; gap: 12px; }
  .vote-btn {
    border: none;
    border-radius: var(--radius);
    padding: 26px 20px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
    box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    position: relative;
  }
  .vote-btn:active { transform: scale(0.97); }
  .vote-btn.A { background: var(--A); color: #fff; }
  .vote-btn.B { background: var(--B); color: #fff; }
  .vote-btn .btn-label { font-size: 1.1rem; font-weight: 900; }

  /* 선택됐을 때: 강조 */
  .vote-btn.selected {
    box-shadow: 0 0 0 4px rgba(0,0,0,0.2), 0 4px 16px rgba(0,0,0,0.15);
    transform: scale(1.02);
  }
  /* 선택 안 된 쪽: 흐리게 (but 클릭은 여전히 가능) */
  .vote-btn.dimmed { opacity: 0.45; }

  /* 선택 변경 안내 */
  .change-hint {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 12px;
  }

  /* ── 결과 ── */
  #screen-result { width: 100%; max-width: 380px; text-align: center; }
  .result-label { font-size: 0.82rem; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 12px; }
  .result-question { font-size: 1rem; font-weight: 700; margin-bottom: 18px; color: var(--text); line-height: 1.5; }

  .voted-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #eafaf1;
    border: 1px solid var(--accent);
    color: var(--accent-dark);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 0.82rem;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .result-bars { display: grid; gap: 10px; margin-bottom: 14px; }
  .result-row { display: flex; align-items: center; gap: 10px; }
  .result-row .side-label {
    font-size: 0.85rem; font-weight: 700;
    width: 72px; text-align: right;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .result-row.A .side-label { color: var(--A); }
  .result-row.B .side-label { color: var(--B); }
  .bar-track { flex: 1; height: 34px; background: #e8edf2; border-radius: 8px; overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 8px;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 10px;
    font-weight: 900; font-size: 0.9rem; color: #fff;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
    min-width: 44px;
  }
  .bar-fill.A { background: var(--A); }
  .bar-fill.B { background: var(--B); }
  .result-total { font-size: 0.82rem; color: var(--muted); font-weight: 700; }

  /* ── 종료 ── */
  #screen-ended { text-align: center; }
  .end-icon { width: 72px; height: 72px; background: var(--accent); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 16px; }
  .end-title { font-size: 1.4rem; font-weight: 900; color: var(--accent-dark); margin-bottom: 6px; }
  .end-sub   { font-size: 0.88rem; color: var(--muted); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- 대기 -->
<div id="screen-waiting">
  <div class="wait-icon">⚡</div>
  <div class="wait-title">밸런스 게임</div>
  <div class="wait-sub">곧 시작됩니다. 준비하세요!</div>
  <div class="pulse-dot"></div>
</div>

<!-- 문제 표시 -->
<div id="screen-showing" class="hidden">
  <div class="q-badge" id="q-badge">Q1 / 5</div>
  <div class="showing-vs" id="showing-vs"></div>
  <div class="showing-hint">잠시 후 투표가 시작됩니다…</div>
</div>

<!-- 투표 -->
<div id="screen-voting" class="hidden">
  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timer-bar" style="width:100%"></div>
  </div>
  <div class="vote-question" id="vote-question-text"></div>
  <div class="vote-buttons">
    <button class="vote-btn A" id="btn-a" onclick="vote('A')">
      <span class="btn-label" id="label-a">A</span>
    </button>
    <button class="vote-btn B" id="btn-b" onclick="vote('B')">
      <span class="btn-label" id="label-b">B</span>
    </button>
  </div>
  <div class="change-hint" id="change-hint"></div>
</div>

<!-- 결과 -->
<div id="screen-result" class="hidden">
  <div class="result-label">🗳️ 투표 결과</div>
  <div class="result-question" id="result-question-text"></div>
  <div id="voted-badge-wrap"></div>
  <div class="result-bars">
    <div class="result-row A">
      <div class="side-label" id="r-label-a">A</div>
      <div class="bar-track"><div class="bar-fill A" id="bar-a" style="width:50%">50%</div></div>
    </div>
    <div class="result-row B">
      <div class="side-label" id="r-label-b">B</div>
      <div class="bar-track"><div class="bar-fill B" id="bar-b" style="width:50%">50%</div></div>
    </div>
  </div>
  <div class="result-total" id="result-total">총 0명 참여</div>
</div>

<!-- 종료 -->
<div id="screen-ended" class="hidden">
  <div class="end-icon">🎉</div>
  <div class="end-title">게임 종료!</div>
  <div class="end-sub">참여해주셔서 감사합니다</div>
</div>

<script>
const socket = io();
let myVote = null;
let maxTime = 15;

function show(name) {
  ['waiting','showing','voting','result','ended'].forEach(k => {
    document.getElementById('screen-' + k).classList.toggle('hidden', k !== name);
  });
}

function updateButtons() {
  const btnA = document.getElementById('btn-a');
  const btnB = document.getElementById('btn-b');
  const hint = document.getElementById('change-hint');
  if (myVote === 'A') {
    btnA.className = 'vote-btn A selected';
    btnB.className = 'vote-btn B dimmed';
    hint.textContent = '다시 눌러서 선택을 바꿀 수 있어요';
  } else if (myVote === 'B') {
    btnA.className = 'vote-btn A dimmed';
    btnB.className = 'vote-btn B selected';
    hint.textContent = '다시 눌러서 선택을 바꿀 수 있어요';
  } else {
    btnA.className = 'vote-btn A';
    btnB.className = 'vote-btn B';
    hint.textContent = '';
  }
}

socket.on('state', (s) => {
  if (s.status === 'waiting') {
    myVote = null;
    show('waiting');

  } else if (s.status === 'showing') {
    myVote = null;
    const q = s.currentQuestion;
    document.getElementById('q-badge').textContent = `Q${s.questionIndex + 1} / ${s.totalQuestions}`;
    document.getElementById('showing-vs').textContent = `${q.A}  vs  ${q.B}`;
    show('showing');

  } else if (s.status === 'voting') {
    const q = s.currentQuestion;
    document.getElementById('vote-question-text').textContent = `${q.A}  vs  ${q.B}`;
    document.getElementById('label-a').textContent = q.A;
    document.getElementById('label-b').textContent = q.B;

    if (s.timeLeft > maxTime) maxTime = s.timeLeft;
    const pct = Math.max(0, (s.timeLeft / maxTime) * 100);
    document.getElementById('timer-bar').style.width = pct + '%';

    updateButtons();
    show('voting');

  } else if (s.status === 'result') {
    const q = s.currentQuestion;
    document.getElementById('result-question-text').textContent = `${q.A}  vs  ${q.B}`;
    document.getElementById('r-label-a').textContent = q.A;
    document.getElementById('r-label-b').textContent = q.B;
    const barA = document.getElementById('bar-a');
    const barB = document.getElementById('bar-b');
    barA.style.width = s.pctA + '%'; barA.textContent = s.pctA + '%';
    barB.style.width = s.pctB + '%'; barB.textContent = s.pctB + '%';
    document.getElementById('result-total').textContent = `총 ${s.total}명 참여`;

    const badge = document.getElementById('voted-badge-wrap');
    if (myVote) {
      const chosen = myVote === 'A' ? q.A : q.B;
      badge.innerHTML = `<div class="voted-badge">✓ 나의 선택: ${chosen}</div>`;
    } else {
      badge.innerHTML = '';
    }
    show('result');

  } else if (s.status === 'ended') {
    show('ended');
  }
});

function vote(choice) {
  // 같은 거 또 누르면 무시
  if (myVote === choice) return;
  myVote = choice;
  socket.emit('vote', { choice });
  updateButtons();
}
</script>
</body>
</html>
