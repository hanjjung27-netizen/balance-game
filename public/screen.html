<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밸런스 게임 스크린</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8edf2;
    --A: #e74c3c;
    --B: #3498db;
    --accent: #1abc9c;
    --accent-dark: #16a085;
    --text: #2c3e50;
    --muted: #7f8c8d;
    --border: rgba(0,0,0,0.08);
    --radius: 16px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 48px;
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .brand {
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--accent-dark);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }
  .progress-info { font-size: 0.95rem; color: var(--muted); font-weight: 700; }
  .live-count { font-size: 0.9rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .live-count strong { color: var(--accent-dark); font-size: 1.1rem; }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 80px;
    position: relative;
    overflow-y: auto;
  }

  /* ── QR 플로팅 ── */
  .qr-float {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    text-align: center;
    z-index: 100;
  }
  .qr-float img { width: 90px; height: 90px; display: block; border-radius: 6px; }
  .qr-float .qr-label { font-size: 0.7rem; font-weight: 700; color: var(--accent-dark); margin-top: 5px; }
  .qr-float.hidden { display: none !important; }

  /* ── 대기 ── */
  #screen-waiting { text-align: center; }
  .wait-qr-wrap {
    display: inline-block;
    background: var(--surface);
    border: 3px solid var(--accent);
    border-radius: 24px;
    padding: 16px;
    box-shadow: 0 6px 28px rgba(26,188,156,0.18);
    margin-bottom: 28px;
  }
  .wait-qr-wrap img { width: 180px; height: 180px; display: block; border-radius: 8px; }
  .wait-qr-label { font-size: 0.85rem; font-weight: 700; color: var(--accent-dark); margin-top: 10px; }
  .wait-title { font-size: 3rem; font-weight: 900; color: var(--accent-dark); margin-bottom: 12px; }
  .wait-sub { font-size: 1.2rem; color: var(--muted); }

  /* ── 문제 표시 ── */
  #screen-showing { text-align: center; width: 100%; }
  .q-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border-radius: 999px;
    padding: 6px 20px;
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 28px;
    letter-spacing: 0.05em;
  }
  .vs-layout { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 32px; }
  .vs-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 44px 28px;
    text-align: center;
    animation: slideUp 0.4s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .vs-card.A { border-top: 5px solid var(--A); }
  .vs-card.B { border-top: 5px solid var(--B); }
  @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .vs-card .card-text { font-size: 2rem; font-weight: 900; }
  .vs-card.A .card-text { color: var(--A); }
  .vs-card.B .card-text { color: var(--B); }
  .vs-divider { font-size: 2rem; font-weight: 900; color: var(--muted); opacity: 0.6; }
  .q-hint { font-size: 1rem; color: var(--muted); margin-top: 24px; animation: blink 1.3s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── 투표 중 ── */
  #screen-voting { width: 100%; }
  .timer-area { text-align: center; margin-bottom: 28px; }
  .timer-circle {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: var(--surface);
    border: 4px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 900; color: var(--accent-dark);
    margin: 0 auto 14px;
    box-shadow: 0 2px 12px rgba(26,188,156,0.2);
    transition: border-color 0.3s, color 0.3s;
  }
  .timer-circle.urgent { border-color: var(--A); color: var(--A); }
  .timer-bar-wrap { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; max-width: 480px; margin: 0 auto; }
  .timer-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); border-radius: 4px; transition: width 0.9s linear; }
  .voting-vs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .voting-card { background: var(--surface); border-radius: var(--radius); padding: 28px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .voting-card.A { border-top: 4px solid var(--A); }
  .voting-card.B { border-top: 4px solid var(--B); }
  .v-label { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
  .voting-card.A .v-label { color: var(--A); }
  .voting-card.B .v-label { color: var(--B); }
  .v-votes { font-size: 2.2rem; font-weight: 900; color: var(--text); }
  .v-votes-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  /* ── 개별 결과 ── */
  #screen-result { width: 100%; }
  .result-headline { text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .result-q-text { text-align: center; font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 28px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .result-card { background: var(--surface); border-radius: var(--radius); padding: 24px 24px 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .result-card.A { border-top: 4px solid var(--A); }
  .result-card.B { border-top: 4px solid var(--B); }
  .rc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .rc-name { font-size: 1.3rem; font-weight: 900; }
  .result-card.A .rc-name { color: var(--A); }
  .result-card.B .rc-name { color: var(--B); }
  .rc-pct { font-size: 3.2rem; font-weight: 900; line-height: 1; margin-bottom: 12px; }
  .result-card.A .rc-pct { color: var(--A); }
  .result-card.B .rc-pct { color: var(--B); }
  .rc-bar-track { height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
  .rc-bar-fill { height: 100%; border-radius: 5px; transition: width 1s cubic-bezier(.4,0,.2,1); }
  .result-card.A .rc-bar-fill { background: var(--A); }
  .result-card.B .rc-bar-fill { background: var(--B); }
  .rc-votes { font-size: 0.85rem; color: var(--muted); margin-top: 6px; font-weight: 700; }
  .result-total-center { text-align: center; font-size: 0.9rem; color: var(--muted); font-weight: 700; }

  /* ── 종료 요약 ── */
  #screen-ended { width: 100%; max-width: 900px; }
  .ended-header { text-align: center; margin-bottom: 28px; }
  .ended-title { font-size: 2rem; font-weight: 900; color: var(--accent-dark); margin-bottom: 6px; }
  .ended-sub { font-size: 1rem; color: var(--muted); }

  .summary-list { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .summary-item {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .summary-q {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .summary-vs {
    font-size: 1rem;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .winner-badge {
    font-size: 0.7rem;
    font-weight: 900;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .winner-badge.A { background: #fdedec; color: var(--A); }
  .winner-badge.B { background: #eaf4fd; color: var(--B); }

  .summary-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .summary-bar-label {
    font-size: 0.78rem;
    font-weight: 700;
    width: 60px;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }
  .summary-bar-label.A { color: var(--A); }
  .summary-bar-label.B { color: var(--B); }
  .summary-bar-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
  .summary-bar-fill {
    height: 100%;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 8px;
    font-size: 0.72rem; font-weight: 900; color: #fff;
    min-width: 32px;
    transition: width 1s cubic-bezier(.4,0,.2,1);
  }
  .summary-bar-fill.A { background: var(--A); }
  .summary-bar-fill.B { background: var(--B); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    BALANCE GAME
  </div>
  <div class="progress-info" id="progress-info">준비 중</div>
  <div class="live-count">참여자 <strong id="vote-count">0</strong>명</div>
</div>

<div class="main">

  <!-- 대기 -->
  <div id="screen-waiting">
    <div class="wait-qr-wrap">
      <img src="/qr.png" alt="참여 QR코드">
      <div class="wait-qr-label">📱 스캔하고 바로 참여하세요!</div>
    </div>
    <div class="wait-title">밸런스 게임</div>
    <div class="wait-sub">QR코드를 스캔해서 지금 바로 참여하세요!</div>
  </div>

  <!-- 문제 표시 -->
  <div id="screen-showing" class="hidden">
    <div class="q-badge" id="q-badge">Q1 / 5</div>
    <div class="vs-layout">
      <div class="vs-card A">
        <div class="card-text" id="sc-label-a">A</div>
      </div>
      <div class="vs-divider">VS</div>
      <div class="vs-card B">
        <div class="card-text" id="sc-label-b">B</div>
      </div>
    </div>
    <div class="q-hint">잠시 후 투표가 시작됩니다…</div>
  </div>

  <!-- 투표 중 -->
  <div id="screen-voting" class="hidden">
    <div class="timer-area">
      <div class="timer-circle" id="timer-circle">15</div>
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timer-bar" style="width:100%"></div>
      </div>
    </div>
    <div class="voting-vs">
      <div class="voting-card A">
        <div class="v-label" id="v-label-a">A</div>
        <div class="v-votes" id="v-votes-a">0</div>
        <div class="v-votes-label">명 투표</div>
      </div>
      <div class="voting-card B">
        <div class="v-label" id="v-label-b">B</div>
        <div class="v-votes" id="v-votes-b">0</div>
        <div class="v-votes-label">명 투표</div>
      </div>
    </div>
  </div>

  <!-- 개별 결과 -->
  <div id="screen-result" class="hidden">
    <div class="result-headline">🗳️ 투표 결과</div>
    <div class="result-q-text" id="res-q-text"></div>
    <div class="result-grid">
      <div class="result-card A">
        <div class="rc-top"><span class="rc-name" id="res-name-a">A</span></div>
        <div class="rc-pct" id="res-pct-a">50%</div>
        <div class="rc-bar-track"><div class="rc-bar-fill" id="res-bar-a" style="width:50%"></div></div>
        <div class="rc-votes" id="res-votes-a">0명</div>
      </div>
      <div class="result-card B">
        <div class="rc-top"><span class="rc-name" id="res-name-b">B</span></div>
        <div class="rc-pct" id="res-pct-b">50%</div>
        <div class="rc-bar-track"><div class="rc-bar-fill" id="res-bar-b" style="width:50%"></div></div>
        <div class="rc-votes" id="res-votes-b">0명</div>
      </div>
    </div>
    <div class="result-total-center" id="res-total">총 0명 참여</div>
  </div>

  <!-- 종료 요약 -->
  <div id="screen-ended" class="hidden">
    <div class="ended-header">
      <div class="ended-title">🎉 게임 종료!</div>
      <div class="ended-sub">전체 투표 결과 요약</div>
    </div>
    <div class="summary-list" id="summary-list"></div>
  </div>

</div>

<!-- QR 플로팅 -->
<div class="qr-float hidden" id="qr-float">
  <img src="/qr.png" alt="참여 QR코드">
  <div class="qr-label">📱 참여하기</div>
</div>

<script>
const socket = io();
let maxTime = 15;

function show(name) {
  ['waiting','showing','voting','result','ended'].forEach(k => {
    document.getElementById('screen-' + k).classList.toggle('hidden', k !== name);
  });
  document.getElementById('qr-float').classList.toggle('hidden', name === 'waiting');
}

function renderSummary(summary) {
  const list = document.getElementById('summary-list');
  list.innerHTML = '';
  summary.forEach((item, i) => {
    list.innerHTML += `
      <div class="summary-item">
        <div class="summary-q">Q${i + 1}</div>
        <div class="summary-vs">
          ${item.A} vs ${item.B}
          <span class="winner-badge ${item.winner}">👑 ${item.winner === 'A' ? item.A : item.B}</span>
        </div>
        <div class="summary-bar-row">
          <div class="summary-bar-label A">${item.A}</div>
          <div class="summary-bar-track">
            <div class="summary-bar-fill A" style="width:${item.pctA}%">${item.pctA}%</div>
          </div>
        </div>
        <div class="summary-bar-row">
          <div class="summary-bar-label B">${item.B}</div>
          <div class="summary-bar-track">
            <div class="summary-bar-fill B" style="width:${item.pctB}%">${item.pctB}%</div>
          </div>
        </div>
      </div>
    `;
  });
}

socket.on('state', (s) => {
  document.getElementById('vote-count').textContent = s.total;

  if (s.status === 'waiting') {
    document.getElementById('progress-info').textContent = '준비 중';
    show('waiting');

  } else if (s.status === 'showing') {
    document.getElementById('progress-info').textContent = `Q${s.questionIndex + 1} / ${s.totalQuestions}`;
    const q = s.currentQuestion;
    document.getElementById('q-badge').textContent = `Q${s.questionIndex + 1} / ${s.totalQuestions}`;
    document.getElementById('sc-label-a').textContent = q.A;
    document.getElementById('sc-label-b').textContent = q.B;
    show('showing');

  } else if (s.status === 'voting') {
    const q = s.currentQuestion;
    document.getElementById('progress-info').textContent = `Q${s.questionIndex + 1} / ${s.totalQuestions}`;
    if (s.timeLeft > maxTime) maxTime = s.timeLeft;
    const pct = Math.max(0, (s.timeLeft / maxTime) * 100);
    document.getElementById('timer-circle').textContent = s.timeLeft;
    document.getElementById('timer-circle').classList.toggle('urgent', s.timeLeft <= 5);
    document.getElementById('timer-bar').style.width = pct + '%';
    document.getElementById('v-label-a').textContent = q.A;
    document.getElementById('v-votes-a').textContent = s.votes.A;
    document.getElementById('v-label-b').textContent = q.B;
    document.getElementById('v-votes-b').textContent = s.votes.B;
    show('voting');

  } else if (s.status === 'result') {
    const q = s.currentQuestion;
    document.getElementById('res-q-text').textContent = `${q.A}  vs  ${q.B}`;
    document.getElementById('res-name-a').textContent = q.A;
    document.getElementById('res-pct-a').textContent = s.pctA + '%';
    document.getElementById('res-bar-a').style.width = s.pctA + '%';
    document.getElementById('res-votes-a').textContent = s.votes.A + '명';
    document.getElementById('res-name-b').textContent = q.B;
    document.getElementById('res-pct-b').textContent = s.pctB + '%';
    document.getElementById('res-bar-b').style.width = s.pctB + '%';
    document.getElementById('res-votes-b').textContent = s.votes.B + '명';
    document.getElementById('res-total').textContent = `총 ${s.total}명 참여`;
    show('result');

  } else if (s.status === 'ended') {
    document.getElementById('progress-info').textContent = '게임 종료';
    renderSummary(s.summary || []);
    show('ended');
  }
});
</script>
</body>
</html>
