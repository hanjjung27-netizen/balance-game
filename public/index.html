<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밸런스 게임</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0d0d14;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }
  .logo { font-size: 4rem; margin-bottom: 16px; }
  h1 {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  p { color: #777; font-size: 0.95rem; margin-bottom: 32px; }
  .links {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    max-width: 560px;
    width: 100%;
  }
  a {
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 20px;
    text-decoration: none;
    color: #f0f0f0;
    font-weight: 700;
    transition: border-color 0.2s;
  }
  a:hover { border-color: #4ecdc4; }
  a span { display: block; font-size: 1.8rem; margin-bottom: 8px; }
  .sub { font-size: 0.75rem; color: #666; font-weight: 400; margin-top: 4px; }
</style>
</head>
<body>
  <div class="logo">⚡</div>
  <h1>밸런스 게임</h1>
  <p>실시간 참여형 이벤트 게임</p>
  <div class="links">
    <a href="/participant.html">
      <span>📱</span>참여자
      <div class="sub">투표에 참여하세요</div>
    </a>
    <a href="/screen.html">
      <span>🖥</span>스크린
      <div class="sub">빔프로젝터/TV용</div>
    </a>
    <a href="/admin.html">
      <span>⚙️</span>관리자
      <div class="sub">게임 진행 제어</div>
    </a>
  </div>
</body>
</html>
