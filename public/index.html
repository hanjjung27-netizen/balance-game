<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밸런스 게임</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f0f4f8;
    color: #2c3e50;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px; text-align: center;
  }
  .icon { width: 72px; height: 72px; background: #1abc9c; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin: 0 auto 18px; }
  h1 { font-size: 2rem; font-weight: 900; color: #16a085; margin-bottom: 6px; }
  p  { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 28px; }
  .links { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; max-width: 500px; width: 100%; }
  a {
    background: #fff; border: 1px solid rgba(0,0,0,0.08);
    border-radius: 14px; padding: 20px;
    text-decoration: none; color: #2c3e50;
    font-weight: 700; font-size: 0.85rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  a:hover { border-color: #1abc9c; box-shadow: 0 3px 12px rgba(26,188,156,0.15); }
  a span { display: block; font-size: 1.8rem; margin-bottom: 8px; }
  .sub { font-size: 0.72rem; color: #7f8c8d; font-weight: 400; margin-top: 3px; }
</style>
</head>
<body>
  <div class="icon">⚡</div>
  <h1>밸런스 게임</h1>
  <p>실시간 참여형 이벤트 게임</p>
  <div class="links">
    <a href="/participant.html"><span>📱</span>참여자<div class="sub">투표에 참여하세요</div></a>
    <a href="/screen.html"><span>🖥</span>스크린<div class="sub">빔프로젝터/TV용</div></a>
    <a href="/admin.html"><span>⚙️</span>관리자<div class="sub">게임 진행 제어</div></a>
  </div>
</body>
</html>
