<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>밸런스 게임 관리자</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8edf2;
    --A: #e74c3c;
    --B: #3498db;
    --accent: #1abc9c;
    --accent-dark: #16a085;
    --text: #2c3e50;
    --muted: #7f8c8d;
    --border: rgba(0,0,0,0.08);
    --radius: 12px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .header-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: #fff;
  }
  .header h1 { font-size: 1.1rem; font-weight: 900; color: var(--accent-dark); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 16px;
    padding: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .status-badge.waiting { background: #ecf0f1; color: var(--muted); }
  .status-badge.showing { background: #fef9e7; color: #f39c12; border: 1px solid #f39c12; }
  .status-badge.voting  { background: #eafaf1; color: var(--accent-dark); border: 1px solid var(--accent); }
  .status-badge.result  { background: #fdedec; color: var(--A); border: 1px solid var(--A); }
  .status-badge.ended   { background: #ecf0f1; color: var(--muted); }

  .current-q { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; color: var(--text); }
  .current-sub { font-size: 0.82rem; color: var(--muted); }

  .vote-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
  .vote-box { border-radius: 10px; padding: 12px 14px; text-align: center; }
  .vote-box.A { background: #fdedec; border: 1px solid rgba(231,76,60,0.25); }
  .vote-box.B { background: #eaf4fd; border: 1px solid rgba(52,152,219,0.25); }
  .vote-box .vb-label { font-size: 0.72rem; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
  .vote-box .vb-count { font-size: 1.8rem; font-weight: 900; line-height: 1; }
  .vote-box.A .vb-count { color: var(--A); }
  .vote-box.B .vb-count { color: var(--B); }
  .total-votes { font-size: 0.82rem; color: var(--muted); text-align: center; font-weight: 700; }

  .btn {
    border: none;
    border-radius: 8px;
    padding: 11px 18px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s, box-shadow 0.1s;
    width: 100%;
    margin-bottom: 8px;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:not(:disabled):hover { box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--A); color: #fff; }
  .btn-warning { background: #f39c12; color: #fff; }
  .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  .timer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .timer-row label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; font-weight: 700; }
  .timer-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .timer-row .timer-val { font-size: 0.9rem; font-weight: 900; color: var(--accent-dark); min-width: 36px; text-align: right; }

  .q-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .q-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .q-item.active { border-color: var(--accent); background: #eafaf1; }
  .q-item .q-num { font-size: 0.72rem; color: var(--muted); min-width: 20px; font-weight: 700; }
  .q-item .q-text { flex: 1; font-size: 0.82rem; color: var(--text); }
  .q-item .q-del {
    background: none; border: none;
    color: #bdc3c7; cursor: pointer;
    font-size: 0.9rem; padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    line-height: 1;
  }
  .q-item .q-del:hover { color: var(--A); background: #fdedec; }

  /* ── 문제 추가 폼 ── */
  .add-form { display: grid; gap: 8px; }

  .xlsx-upload-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: center;
  }
  .xlsx-upload-area:hover { border-color: var(--accent); background: #eafaf1; }
  .xlsx-icon { font-size: 1.5rem; }
  .xlsx-text { font-size: 0.85rem; font-weight: 700; color: var(--text); }
  .xlsx-sub  { font-size: 0.72rem; color: var(--muted); }

  .divider-or {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 700;
    position: relative;
    margin: 2px 0;
  }
  .divider-or::before, .divider-or::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 36%;
    height: 1px;
    background: var(--border);
  }
  .divider-or::before { left: 0; }
  .divider-or::after  { right: 0; }

  .direct-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-group label { font-size: 0.72rem; color: var(--muted); font-weight: 700; }
  .input-group input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
  }
  .input-group input:focus { border-color: var(--accent); background: #fff; }

  .links-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .link-btn {
    display: block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    font-size: 0.8rem;
    font-weight: 700;
    transition: border-color 0.2s, background 0.2s;
  }
  .link-btn:hover { border-color: var(--accent); background: #eafaf1; }
  .link-btn span { display: block; font-size: 1.2rem; margin-bottom: 3px; }

  .log {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.73rem;
    color: var(--muted);
    height: 110px;
    overflow-y: auto;
    font-family: monospace;
    line-height: 1.8;
  }
  .log-entry.action { color: var(--accent-dark); }
  .log-entry.system { color: #f39c12; }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⚡</div>
  <h1>밸런스 게임 관리자</h1>
</div>

<div class="layout">
  <!-- 왼쪽 -->
  <div>
    <div class="card">
      <div class="card-title">현재 상태</div>
      <div class="status-badge waiting" id="status-badge">대기 중</div>
      <div class="current-q" id="current-q">문제가 없습니다</div>
      <div class="current-sub" id="current-sub">다음 문제 버튼을 눌러 시작하세요</div>
      <div class="vote-split">
        <div class="vote-box A">
          <div class="vb-label" id="vb-label-a">A 팀</div>
          <div class="vb-count" id="vb-count-a">0</div>
        </div>
        <div class="vote-box B">
          <div class="vb-label" id="vb-label-b">B 팀</div>
          <div class="vb-count" id="vb-count-b">0</div>
        </div>
      </div>
      <div class="total-votes" id="total-votes">총 0명 투표</div>
    </div>

    <div class="card">
      <div class="card-title">게임 제어</div>
      <div class="timer-row">
        <label>투표 시간</label>
        <input type="range" id="timer-range" min="5" max="60" value="15" step="5"
          oninput="document.getElementById('timer-val').textContent=this.value+'초'">
        <span class="timer-val" id="timer-val">15초</span>
      </div>
      <button class="btn btn-primary" id="btn-next"   onclick="adminNext()">⏭ 다음 문제</button>
      <button class="btn btn-warning" id="btn-vote"   onclick="adminStartVote()" disabled>🗳 투표 시작</button>
      <button class="btn btn-danger"  id="btn-result" onclick="adminShowResult()" disabled>📊 결과 공개</button>
      <button class="btn btn-ghost"   onclick="adminReset()">🔄 처음부터</button>
    </div>

    <div class="card">
      <div class="card-title">페이지 링크</div>
      <div class="links-row">
        <a href="/participant.html" target="_blank" class="link-btn"><span>📱</span>참여자</a>
        <a href="/screen.html"     target="_blank" class="link-btn"><span>🖥</span>스크린</a>
      </div>
    </div>

    <div class="card">
      <div class="card-title">이벤트 로그</div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <!-- 오른쪽: 문제 관리 -->
  <div>
    <div class="card">
      <div class="card-title">문제 목록</div>
      <div class="q-list" id="q-list"></div>
      <button class="btn btn-ghost" onclick="saveQuestions()">💾 목록 저장 (서버 반영)</button>
    </div>

    <div class="card">
      <div class="card-title">문제 추가</div>
      <div class="add-form">
        <label class="xlsx-upload-area">
          <input type="file" id="xlsx-input" accept=".xlsx,.xls" style="display:none" onchange="handleXlsx(this)">
          <span class="xlsx-icon">📂</span>
          <span class="xlsx-text">엑셀 파일 업로드 (.xlsx)</span>
          <span class="xlsx-sub">A열: A선택지 &nbsp;|&nbsp; B열: B선택지</span>
        </label>

        <div class="divider-or">또는 직접 입력</div>

        <div class="direct-row">
          <div class="input-group">
            <label><span style="color:var(--A);font-weight:900;">A</span> 선택지</label>
            <input type="text" id="new-a" placeholder="예: 카페인">
          </div>
          <div class="input-group">
            <label><span style="color:var(--B);font-weight:900;">B</span> 선택지</label>
            <input type="text" id="new-b" placeholder="예: 낮잠">
          </div>
        </div>
        <button class="btn btn-primary" onclick="addQuestion()">+ 추가</button>
      </div>
    </div>
  </div>
</div>

<script>
const socket = io();
let state = null;
let localQuestions = [];

function log(msg, type = 'action') {
  const box = document.getElementById('log');
  const now = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const el = document.createElement('span');
  el.className = 'log-entry ' + type;
  el.textContent = `[${now}] ${msg}`;
  box.appendChild(el);
  box.appendChild(document.createElement('br'));
  box.scrollTop = box.scrollHeight;
}

socket.on('state', (s) => {
  state = s;
  const badge = document.getElementById('status-badge');
  const labels = { waiting:'대기 중', showing:'문제 표시', voting:'투표 중', result:'결과 표시', ended:'종료' };
  badge.textContent = labels[s.status] || s.status;
  badge.className = 'status-badge ' + s.status;

  if (s.currentQuestion) {
    const q = s.currentQuestion;
    document.getElementById('current-q').textContent = `${q.A}  vs  ${q.B}`;
    document.getElementById('current-sub').textContent = `Q${s.questionIndex + 1} / ${s.totalQuestions}`;
    document.getElementById('vb-label-a').textContent = q.A;
    document.getElementById('vb-label-b').textContent = q.B;
  } else {
    document.getElementById('current-q').textContent = '문제가 없습니다';
    document.getElementById('current-sub').textContent = '다음 문제 버튼을 눌러 시작하세요';
  }
  document.getElementById('vb-count-a').textContent = s.votes.A;
  document.getElementById('vb-count-b').textContent = s.votes.B;
  document.getElementById('total-votes').textContent = `총 ${s.total}명 투표`;

  document.getElementById('btn-next').disabled   = (s.status === 'voting' || s.status === 'ended');
  document.getElementById('btn-vote').disabled   = (s.status !== 'showing');
  document.getElementById('btn-result').disabled = (s.status !== 'voting');

  renderQList();
});

socket.on('questions', (qs) => {
  localQuestions = qs;
  renderQList();
});

function adminNext()       { socket.emit('admin:next'); log('다음 문제로 이동'); }
function adminStartVote()  { const sec = parseInt(document.getElementById('timer-range').value); socket.emit('admin:startVote', { seconds: sec }); log(`투표 시작 (${sec}초)`); }
function adminShowResult() { socket.emit('admin:showResult'); log('결과 공개'); }
function adminReset()      { if (!confirm('처음부터 다시 시작하시겠습니까?')) return; socket.emit('admin:reset'); log('게임 리셋', 'system'); }

function renderQList() {
  const list = document.getElementById('q-list');
  list.innerHTML = '';
  localQuestions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-item' + (state && state.questionIndex === i ? ' active' : '');
    div.innerHTML = `
      <span class="q-num">${i + 1}</span>
      <span class="q-text">${q.A} / ${q.B}</span>
      <button class="q-del" onclick="deleteQ(${i})">✕</button>
    `;
    list.appendChild(div);
  });
}

function deleteQ(i) { localQuestions.splice(i, 1); renderQList(); }

function addQuestion() {
  const a = document.getElementById('new-a').value.trim();
  const b = document.getElementById('new-b').value.trim();
  if (!a || !b) { alert('A, B 선택지를 모두 입력하세요'); return; }
  localQuestions.push({ id: Date.now(), A: a, B: b, emoji: { A: '⚡', B: '⚡' } });
  renderQList();
  document.getElementById('new-a').value = '';
  document.getElementById('new-b').value = '';
  log(`문제 추가: ${a} vs ${b}`);
}

function handleXlsx(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb   = XLSX.read(data, { type: 'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

      let added = 0;
      rows.forEach((row, i) => {
        const a = String(row[0] || '').trim();
        const b = String(row[1] || '').trim();
        // 헤더 행 자동 스킵 (텍스트가 'A' 'B' 'A선택지' 등인 경우)
        if (i === 0 && (!b || b === 'B' || b === 'B선택지')) return;
        if (a && b) {
          localQuestions.push({ id: Date.now() + i, A: a, B: b, emoji: { A: '⚡', B: '⚡' } });
          added++;
        }
      });

      renderQList();
      log(`엑셀 업로드: ${added}개 문제 추가`, 'system');
      input.value = '';
    } catch (err) {
      alert('엑셀 파일 읽기 실패: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function saveQuestions() {
  socket.emit('admin:setQuestions', localQuestions);
  log(`문제 목록 저장 (${localQuestions.length}개)`, 'system');
}

socket.emit('admin:getQuestions');
setTimeout(() => {
  if (localQuestions.length === 0) {
    localQuestions = [
      { id:1, A:'치킨', B:'피자',   emoji:{ A:'⚡', B:'⚡' } },
      { id:2, A:'바다', B:'산',     emoji:{ A:'⚡', B:'⚡' } },
      { id:3, A:'아침형 인간', B:'야행성 인간', emoji:{ A:'⚡', B:'⚡' } },
      { id:4, A:'혼밥', B:'같이 밥', emoji:{ A:'⚡', B:'⚡' } },
      { id:5, A:'여름', B:'겨울',   emoji:{ A:'⚡', B:'⚡' } },
    ];
    renderQList();
  }
}, 500);
log('관리자 접속', 'system');
</script>
</body>
</html>
